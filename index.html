<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema Financeiro MEI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <div class="header-inner">
      <div class="header-logo">
        <div class="logo-mark">
          <span class="logo-m">m</span><span class="logo-e">e</span><span class="logo-i">i</span>
        </div>
        <span class="header-title">Sistema Financeiro</span>
      </div>
      <span id="breadcrumb">🏠 Início</span>
    </div>
  </header>

  <main>

    <!-- TELA CRs -->
    <div id="tela-crs" class="tela active">
      <div class="tela-header">
        <h2>Meus CRs</h2>
        <button onclick="abrirModal('modal-cr')">+ Novo CR</button>
      </div>
      <div id="lista-crs" class="grid-cards"></div>
    </div>

    <!-- TELA GRUPOS -->
    <div id="tela-grupos" class="tela">
      <div class="tela-header">
        <h2 id="titulo-grupos">Grupos</h2>
        <div style="display:flex;gap:10px;">
          <button class="btn-secondary" onclick="verBalancete()">📊 Balancete</button>
          <button onclick="abrirModal('modal-grupo')">+ Novo Grupo</button>
        </div>
      </div>
      <div id="lista-grupos" class="grid-cards"></div>
    </div>

    <!-- TELA REUNIÕES -->
    <div id="tela-reunioes" class="tela">
      <div class="tela-header">
        <h2 id="titulo-reunioes">Reuniões</h2>
        <button onclick="abrirModal('modal-reuniao')">+ Nova Reunião</button>
      </div>
      <div id="lista-reunioes" class="grid-cards"></div>
    </div>

    <!-- TELA ITENS -->
    <div id="tela-itens" class="tela">
      <div class="tela-header">
        <h2 id="titulo-itens">Itens</h2>
        <button onclick="addItem()">+ Adicionar Item</button>
      </div>
      <div class="table-wrapper">
        <table id="tbl-itens">
          <thead>
            <tr>
              <th>Descrição</th>
              <th>Fornecedor Cotado</th>
              <th>Vlr Unitário</th>
              <th>Qtd</th>
              <th>Vlr Total</th>
              <th>Aprovado?</th>
              <th>Nº Pedido</th>
              <th>Fornecedor Contratado</th>
              <th>Nº NF</th>
              <th>AS?</th>
              <th>Pago?</th>
              <th>🗑️</th>
            </tr>
          </thead>
          <tbody id="tbody-itens"></tbody>
          <tfoot>
            <tr>
              <td colspan="4"><strong>Total</strong></td>
              <td id="total-itens">R$ 0,00</td>
              <td colspan="7"></td>
            </tr>
          </tfoot>
        </table>
      </div>
      <button class="btn-salvar" onclick="salvarItens()">💾 Salvar</button>
    </div>

    <!-- TELA BALANCETE -->
    <div id="tela-balancete" class="tela">
      <div class="tela-header">
        <h2 id="titulo-balancete">Balancete</h2>
        <button class="btn-secondary" onclick="irParaGrupos()">← Voltar</button>
      </div>
      <div id="conteudo-balancete"></div>
    </div>

  </main>

  <!-- MODAL CR -->
  <div id="modal-cr" class="modal">
    <div class="modal-box">
      <h3>Novo CR</h3>
      <input id="input-cr" type="text" placeholder="Nome do CR (ex: CR São Paulo 2026)">
      <label class="input-label">Orçamento inicial (R$)</label>
      <input id="input-cr-orcamento" type="number" placeholder="0,00" min="0" step="0.01">
      <div class="modal-actions">
        <button onclick="salvarCR()">Salvar</button>
        <button class="btn-cancel" onclick="fecharModal('modal-cr')">Cancelar</button>
      </div>
    </div>
  </div>

  <!-- MODAL EDITAR ORÇAMENTO -->
  <div id="modal-orcamento" class="modal">
    <div class="modal-box">
      <h3>Editar Orçamento</h3>
      <label class="input-label">Valor do orçamento (R$)</label>
      <input id="input-orcamento" type="number" placeholder="0,00" min="0" step="0.01">
      <div class="modal-actions">
        <button onclick="salvarOrcamento()">Salvar</button>
        <button class="btn-cancel" onclick="fecharModal('modal-orcamento')">Cancelar</button>
      </div>
    </div>
  </div>

  <!-- MODAL GRUPO -->
  <div id="modal-grupo" class="modal">
    <div class="modal-box">
      <h3>Novo Grupo</h3>
      <input id="input-grupo" type="text" placeholder="Nome do grupo (ex: Comitê de Líderes)">
      <div class="modal-actions">
        <button onclick="salvarGrupo()">Salvar</button>
        <button class="btn-cancel" onclick="fecharModal('modal-grupo')">Cancelar</button>
      </div>
    </div>
  </div>

  <!-- MODAL REUNIÃO -->
  <div id="modal-reuniao" class="modal">
    <div class="modal-box">
      <h3>Nova Reunião</h3>
      <input id="input-reuniao" type="text" placeholder="Nome (ex: Reunião 06/02)">
      <div class="modal-actions">
        <button onclick="salvarReuniao()">Salvar</button>
        <button class="btn-cancel" onclick="fecharModal('modal-reuniao')">Cancelar</button>
      </div>
    </div>
  </div>

  <script src="db.js"></script>
  <script src="app.js"></script>
</body>
</html>
